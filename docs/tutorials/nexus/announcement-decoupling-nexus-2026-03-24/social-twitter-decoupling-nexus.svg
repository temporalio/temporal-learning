<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#0D1117"/>

  <!-- Accent bar -->
  <rect x="60" y="60" width="6" height="180" fill="#00C4B4" rx="3"/>

  <!-- Headline -->
  <text x="90" y="120" fill="#FFFFFF" font-family="sans-serif" font-size="54" font-weight="bold">Compliance ships a bug.</text>
  <text x="90" y="185" fill="#FFFFFF" font-family="sans-serif" font-size="54" font-weight="bold">Payments goes down.</text>

  <!-- Subhead -->
  <text x="90" y="255" fill="#8B949E" font-family="sans-serif" font-size="30">Split the monolith. Keep the durability.</text>

  <!-- Architecture diagram: two boxes with Nexus connection -->
  <rect x="90" y="310" width="240" height="80" rx="8" fill="#1A2332" stroke="#30363D" stroke-width="2"/>
  <text x="145" y="340" fill="#FFFFFF" font-family="monospace" font-size="18" font-weight="bold">Payments</text>
  <text x="132" y="370" fill="#8B949E" font-family="monospace" font-size="14">Worker + Workflow</text>

  <!-- Arrow -->
  <line x1="330" y1="350" x2="430" y2="350" stroke="#00C4B4" stroke-width="3"/>
  <polygon points="430,343 445,350 430,357" fill="#00C4B4"/>
  <rect x="350" y="325" width="80" height="24" rx="12" fill="#00C4B4"/>
  <text x="365" y="342" fill="#0D1117" font-family="monospace" font-size="12" font-weight="bold">Nexus</text>

  <!-- Compliance box -->
  <rect x="450" y="310" width="260" height="80" rx="8" fill="#1A2332" stroke="#30363D" stroke-width="2"/>
  <text x="500" y="340" fill="#FFFFFF" font-family="monospace" font-size="18" font-weight="bold">Compliance</text>
  <text x="487" y="370" fill="#8B949E" font-family="monospace" font-size="14">Independent Worker</text>

  <!-- Concept pills -->
  <rect x="90" y="430" width="200" height="44" rx="22" fill="#1A2332" stroke="#00C4B4" stroke-width="2"/>
  <text x="120" y="459" fill="#00C4B4" font-family="monospace" font-size="17">Nexus Service</text>

  <rect x="310" y="430" width="220" height="44" rx="22" fill="#1A2332" stroke="#00C4B4" stroke-width="2"/>
  <text x="335" y="459" fill="#00C4B4" font-family="monospace" font-size="17">Nexus Endpoint</text>

  <rect x="550" y="430" width="220" height="44" rx="22" fill="#1A2332" stroke="#00C4B4" stroke-width="2"/>
  <text x="585" y="459" fill="#00C4B4" font-family="monospace" font-size="17">Nexus Operation</text>

  <!-- SDK badge -->
  <rect x="90" y="510" width="90" height="36" rx="6" fill="#00C4B4"/>
  <text x="113" y="534" fill="#0D1117" font-family="monospace" font-size="16" font-weight="bold">Java</text>

  <!-- URL -->
  <text x="90" y="600" fill="#8B949E" font-family="sans-serif" font-size="18">learn.temporal.io/tutorials/nexus</text>

  <!-- Temporal wordmark -->
  <text x="90" y="640" fill="#FFFFFF" font-family="sans-serif" font-size="22" font-weight="bold">temporal</text>
</svg>
