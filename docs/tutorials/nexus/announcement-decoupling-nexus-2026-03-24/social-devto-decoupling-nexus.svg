<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-devto" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="420" fill="url(#bg-devto)"/>

  <!-- Left side: text content -->
  <!-- Label -->
  <text x="50" y="45" fill="#00C4B4" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="3">HANDS-ON TUTORIAL</text>

  <!-- Title -->
  <text x="50" y="90" fill="#FFFFFF" font-family="sans-serif" font-size="34" font-weight="bold">Split a Temporal Monolith</text>
  <text x="50" y="130" fill="#FFFFFF" font-family="sans-serif" font-size="34" font-weight="bold">into Two Services</text>
  <text x="50" y="170" fill="#FFFFFF" font-family="sans-serif" font-size="34" font-weight="bold">with Nexus</text>

  <!-- Subtitle -->
  <text x="50" y="210" fill="#8B949E" font-family="sans-serif" font-size="18">Same method call. Different architecture.</text>
  <text x="50" y="235" fill="#8B949E" font-family="sans-serif" font-size="18">Full durability across team boundaries.</text>

  <!-- Concept pills row -->
  <rect x="50" y="262" width="145" height="32" rx="16" fill="#1A2332" stroke="#00C4B4" stroke-width="1.5"/>
  <text x="70" y="284" fill="#00C4B4" font-family="monospace" font-size="13">@Service</text>

  <rect x="210" y="262" width="165" height="32" rx="16" fill="#1A2332" stroke="#00C4B4" stroke-width="1.5"/>
  <text x="230" y="284" fill="#00C4B4" font-family="monospace" font-size="13">@Operation</text>

  <rect x="390" y="262" width="155" height="32" rx="16" fill="#1A2332" stroke="#00C4B4" stroke-width="1.5"/>
  <text x="410" y="284" fill="#00C4B4" font-family="monospace" font-size="13">Durability</text>

  <!-- SDK + time -->
  <rect x="50" y="315" width="75" height="30" rx="5" fill="#00C4B4"/>
  <text x="68" y="336" fill="#0D1117" font-family="monospace" font-size="14" font-weight="bold">Java</text>
  <text x="140" y="336" fill="#8B949E" font-family="sans-serif" font-size="15">~45-60 min  |  Intermediate</text>

  <!-- URL -->
  <text x="50" y="380" fill="#8B949E" font-family="sans-serif" font-size="14">learn.temporal.io/tutorials/nexus</text>
  <text x="50" y="405" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">temporal</text>

  <!-- Right side: visual metaphor - two boxes splitting apart -->
  <!-- Single monolith block breaking into two -->
  <rect x="620" y="50" width="160" height="140" rx="8" fill="#1A2332" stroke="#F0883E" stroke-width="2"/>
  <text x="645" y="95" fill="#F0883E" font-family="monospace" font-size="14" font-weight="bold">Monolith</text>
  <line x1="640" y1="110" x2="760" y2="110" stroke="#30363D" stroke-width="1"/>
  <text x="645" y="135" fill="#8B949E" font-family="monospace" font-size="12">Payments</text>
  <text x="645" y="158" fill="#8B949E" font-family="monospace" font-size="12">Compliance</text>
  <text x="645" y="178" fill="#F0883E" font-family="monospace" font-size="11">1 Worker</text>

  <!-- Arrow down -->
  <line x1="700" y1="200" x2="700" y2="240" stroke="#8B949E" stroke-width="2"/>
  <polygon points="694,240 700,252 706,240" fill="#8B949E"/>

  <!-- Two separated boxes -->
  <rect x="595" y="265" width="135" height="100" rx="8" fill="#1A2332" stroke="#00C4B4" stroke-width="2"/>
  <text x="612" y="295" fill="#00C4B4" font-family="monospace" font-size="13" font-weight="bold">Payments</text>
  <text x="612" y="318" fill="#8B949E" font-family="monospace" font-size="11">Worker 1</text>
  <text x="612" y="350" fill="#8B949E" font-family="monospace" font-size="11">Independent</text>

  <!-- Nexus bridge -->
  <line x1="730" y1="315" x2="785" y2="315" stroke="#00C4B4" stroke-width="2"/>
  <rect x="740" y="298" width="55" height="20" rx="10" fill="#00C4B4"/>
  <text x="748" y="313" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold">Nexus</text>

  <!-- Compliance box -->
  <rect x="790" y="265" width="155" height="100" rx="8" fill="#1A2332" stroke="#00C4B4" stroke-width="2"/>
  <text x="807" y="295" fill="#00C4B4" font-family="monospace" font-size="13" font-weight="bold">Compliance</text>
  <text x="807" y="318" fill="#8B949E" font-family="monospace" font-size="11">Worker 2</text>
  <text x="807" y="350" fill="#8B949E" font-family="monospace" font-size="11">Independent</text>

  <!-- Durability note -->
  <text x="610" y="395" fill="#00C4B4" font-family="sans-serif" font-size="12" font-weight="bold">Kill a Worker. It recovers.</text>
</svg>
