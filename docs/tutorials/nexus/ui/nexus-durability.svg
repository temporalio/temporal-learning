<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 920 420" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <defs>
      <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0f1117"/>
        <stop offset="100%" stop-color="#161b22"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  
    <rect width="920" height="420" fill="url(#bgGrad)" rx="12"/>
  
    <!-- Title -->
    <text x="460" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">Durability Across the Nexus Boundary</text>
    <text x="460" y="52" text-anchor="middle" fill="#b1bac4" font-size="11">Compliance goes down? The workflow waits. Compliance comes back? It resumes. No data loss.</text>
  
    <!-- ===== TIMELINE ===== -->
    <!-- Main horizontal timeline -->
    <line x1="60" y1="200" x2="860" y2="200" stroke="#30363d" stroke-width="2"/>
  
    <!-- Time markers -->
    <text x="100" y="230" text-anchor="middle" fill="#768390" font-size="9">t=0</text>
    <text x="280" y="230" text-anchor="middle" fill="#768390" font-size="9">t=1</text>
    <text x="460" y="230" text-anchor="middle" fill="#768390" font-size="9">t=2</text>
    <text x="640" y="230" text-anchor="middle" fill="#768390" font-size="9">t=3</text>
    <text x="820" y="230" text-anchor="middle" fill="#768390" font-size="9">t=4</text>
  
    <!-- ===== PHASE 1: Working ===== -->
    <rect x="60" y="78" width="200" height="106" rx="8" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-opacity="0.3"/>
  
    <!-- Step 1: Validate -->
    <rect x="75" y="92" width="80" height="38" rx="6" fill="#1c2128" stroke="#3b82f6" stroke-opacity="0.5"/>
    <text x="115" y="108" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="700">STEP 1</text>
    <text x="115" y="122" text-anchor="middle" fill="#e6edf3" font-size="9">validate</text>
  
    <!-- Arrow -->
    <line x1="155" y1="111" x2="170" y2="111" stroke="#484f58" stroke-width="1"/>
    <polygon points="168,107 175,111 168,115" fill="#768390"/>
  
    <!-- Step 2 starts: Nexus call -->
    <rect x="175" y="92" width="80" height="38" rx="6" fill="#1c2128" stroke="#f97316" stroke-opacity="0.5"/>
    <text x="215" y="108" text-anchor="middle" fill="#f97316" font-size="8" font-weight="700">STEP 2</text>
    <text x="215" y="122" text-anchor="middle" fill="#e6edf3" font-size="9">compliance</text>
  
    <text x="160" y="165" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">Payment calls Nexus</text>
    <text x="160" y="178" text-anchor="middle" fill="#b1bac4" font-size="9">Compliance worker is running</text>
  
    <!-- Green dot on timeline -->
    <circle cx="100" cy="200" r="6" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="160" cy="200" r="4" fill="#f97316" filter="url(#glow)"/>
  
    <!-- ===== PHASE 2: Compliance crashes ===== -->
    <rect x="270" y="78" width="180" height="106" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-opacity="0.3"/>
  
    <!-- Crash icon -->
    <text x="360" y="105" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="700">&#x26A0;</text>
    <text x="360" y="126" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">Compliance Worker</text>
    <text x="360" y="140" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">CRASHES</text>
  
    <text x="360" y="165" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Bug deployed at 3am</text>
    <text x="360" y="178" text-anchor="middle" fill="#b1bac4" font-size="9">Worker process dies</text>
  
    <!-- Red X on timeline -->
    <text x="280" y="206" text-anchor="middle" fill="#ef4444" font-size="18" font-weight="700">&#x2715;</text>
  
    <!-- Animated crash pulse -->
    <circle cx="280" cy="200" r="5" fill="#ef4444" opacity="0">
      <animate attributeName="r" values="5;20;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  
    <!-- ===== PHASE 3: Workflow waits ===== -->
    <rect x="462" y="78" width="180" height="106" rx="8" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.3"/>
  
    <!-- Waiting icon -->
    <text x="552" y="108" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700">Payment Workflow</text>
    <text x="552" y="124" text-anchor="middle" fill="#3b82f6" font-size="20">&#x23F8;</text>
    <text x="552" y="140" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">PAUSED</text>
  
    <text x="552" y="165" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">No crash. No timeout.</text>
    <text x="552" y="178" text-anchor="middle" fill="#b1bac4" font-size="9">Temporal holds the state durably</text>
  
    <!-- Waiting dots on timeline -->
    <circle cx="470" cy="200" r="3" fill="#3b82f6" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="200" r="3" fill="#3b82f6" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="530" cy="200" r="3" fill="#3b82f6" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="200" r="3" fill="#3b82f6" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="200" r="3" fill="#3b82f6" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  
    <!-- ===== PHASE 4: Compliance recovers ===== -->
    <rect x="660" y="78" width="200" height="106" rx="8" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-opacity="0.3"/>
  
    <!-- Recovery -->
    <text x="760" y="102" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">Compliance Worker</text>
    <text x="760" y="116" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">RESTARTS</text>
  
    <!-- Arrow back to step 2 continuing -->
    <rect x="680" y="126" width="65" height="30" rx="5" fill="#1c2128" stroke="#f97316" stroke-opacity="0.4"/>
    <text x="712" y="140" text-anchor="middle" fill="#f97316" font-size="8" font-weight="700">STEP 2</text>
    <text x="712" y="151" text-anchor="middle" fill="#b1bac4" font-size="7">resumes</text>
  
    <line x1="745" y1="141" x2="758" y2="141" stroke="#484f58" stroke-width="1"/>
    <polygon points="756,137 763,141 756,145" fill="#768390"/>
  
    <rect x="763" y="126" width="65" height="30" rx="5" fill="#1c2128" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="795" y="140" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="700">STEP 3</text>
    <text x="795" y="151" text-anchor="middle" fill="#b1bac4" font-size="7">execute</text>
  
    <text x="760" y="172" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">Picks up where it left off</text>
    <text x="760" y="184" text-anchor="middle" fill="#b1bac4" font-size="9">No retries. No data loss.</text>
  
    <!-- Green checkmark on timeline -->
    <circle cx="640" cy="200" r="6" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="820" cy="200" r="6" fill="#22c55e" filter="url(#glow)"/>
    <text x="820" y="204" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">&#x2713;</text>
  
    <!-- ===== COMPARISON BAR ===== -->
    <line x1="60" y1="260" x2="860" y2="260" stroke="#30363d" stroke-width="1"/>
  
    <!-- Without Nexus comparison -->
    <rect x="60" y="280" width="400" height="112" rx="10" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.2"/>
    <text x="80" y="302" fill="#ef4444" font-size="12" font-weight="700">Without Nexus (Monolith)</text>
  
    <rect x="80" y="312" width="120" height="24" rx="4" fill="#ef4444" fill-opacity="0.08"/>
    <text x="140" y="328" text-anchor="middle" fill="#ef4444" font-size="10">Activity timeout</text>
  
    <rect x="210" y="312" width="120" height="24" rx="4" fill="#ef4444" fill-opacity="0.08"/>
    <text x="270" y="328" text-anchor="middle" fill="#ef4444" font-size="10">Blind retries</text>
  
    <rect x="340" y="312" width="100" height="24" rx="4" fill="#ef4444" fill-opacity="0.08"/>
    <text x="390" y="328" text-anchor="middle" fill="#ef4444" font-size="10">Shared blast radius</text>
  
    <text x="80" y="362" fill="#b1bac4" font-size="10">Teams coupled in one worker. One bad deploy takes down</text>
    <text x="80" y="376" fill="#b1bac4" font-size="10">everything. No independent scaling, deploys, or perimeters.</text>
  
    <!-- Nexus comparison -->
    <rect x="500" y="280" width="360" height="112" rx="10" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.2"/>
    <text x="520" y="302" fill="#22c55e" font-size="12" font-weight="700">With Temporal Nexus</text>
  
    <rect x="520" y="312" width="120" height="24" rx="4" fill="#22c55e" fill-opacity="0.08"/>
    <text x="580" y="328" text-anchor="middle" fill="#22c55e" font-size="10">Workflow waits</text>
  
    <rect x="650" y="312" width="120" height="24" rx="4" fill="#22c55e" fill-opacity="0.08"/>
    <text x="710" y="328" text-anchor="middle" fill="#22c55e" font-size="10">Auto-resumes</text>
  
    <rect x="780" y="312" width="60" height="24" rx="4" fill="#22c55e" fill-opacity="0.08"/>
    <text x="810" y="328" text-anchor="middle" fill="#22c55e" font-size="10">Done</text>
  
    <text x="520" y="362" fill="#b1bac4" font-size="10">You write: nothing. Temporal handles it.</text>
    <text x="520" y="376" fill="#22c55e" font-size="10" font-weight="600">Zero infrastructure code. Zero data loss.</text>
  
    <!-- Footer -->
    <text x="460" y="412" text-anchor="middle" fill="#768390" font-size="10">Same durable guarantees that protect your workflows now protect your cross-team calls.</text>
  
  </svg>