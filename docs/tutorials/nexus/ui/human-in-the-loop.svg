<svg viewBox="0 0 920 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="blueZone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="greenZone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="orangeZone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="400" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">TXN-B: Human-in-the-Loop via Nexus</text>
  <text x="460" y="50" text-anchor="middle" fill="#ffffff" font-size="11">MEDIUM risk — workflow durably pauses for human review</text>

  <!-- Payments zone -->
  <rect x="30" y="70" width="260" height="300" rx="10" fill="url(#blueZone)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="160" y="92" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700" letter-spacing="0.08em">PAYMENTS</text>

  <!-- Nexus boundary -->
  <rect x="310" y="70" width="80" height="300" rx="8" fill="url(#orangeZone)" stroke="#f97316" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="350" y="92" text-anchor="middle" fill="#f97316" font-size="9" font-weight="700" letter-spacing="0.08em">NEXUS</text>

  <!-- Compliance zone -->
  <rect x="410" y="70" width="480" height="300" rx="10" fill="url(#greenZone)" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="650" y="92" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700" letter-spacing="0.08em">COMPLIANCE</text>

  <!-- Step 1: Payment Workflow starts -->
  <rect x="60" y="120" width="200" height="44" rx="6" fill="#1c2128" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="160" y="139" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">STEP 1</text>
  <text x="160" y="154" text-anchor="middle" fill="#ffffff" font-size="10">PaymentWorkflow calls</text>

  <!-- Arrow to Nexus -->
  <line x1="260" y1="142" x2="310" y2="142" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowBlue)"/>

  <!-- Nexus checkCompliance -->
  <rect x="315" y="125" width="70" height="34" rx="6" fill="#1c2128" stroke="#f97316" stroke-opacity="0.5" stroke-width="1"/>
  <text x="350" y="146" text-anchor="middle" fill="#f97316" font-size="8" font-weight="600">check</text>

  <!-- Arrow to Compliance Workflow -->
  <line x1="385" y1="142" x2="430" y2="142" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>

  <!-- Step 2: Compliance scores MEDIUM -->
  <rect x="430" y="120" width="200" height="44" rx="6" fill="#1c2128" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="530" y="139" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">STEP 2</text>
  <text x="530" y="154" text-anchor="middle" fill="#ffffff" font-size="10">Activity scores → MEDIUM</text>

  <!-- Arrow down to await -->
  <line x1="530" y1="164" x2="530" y2="195" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Workflow.await box with pulse -->
  <rect x="450" y="198" width="160" height="50" rx="8" fill="#1c2128" stroke="#f97316" stroke-opacity="0.6" stroke-width="1.5"/>
  <circle cx="475" cy="223" r="5" fill="#f97316" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="535" y="218" text-anchor="middle" fill="#f97316" font-size="10" font-weight="700">Workflow.await()</text>
  <text x="535" y="234" text-anchor="middle" fill="#ffffff" font-size="9">durably paused</text>

  <!-- Human reviewer box -->
  <rect x="680" y="198" width="180" height="50" rx="8" fill="#1c2128" stroke="#b1bac4" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="770" y="218" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">👤 Human Reviewer</text>
  <text x="770" y="234" text-anchor="middle" fill="#ffffff" font-size="9">approves or denies</text>

  <!-- Arrow from reviewer back through Nexus to workflow -->
  <line x1="680" y1="270" x2="680" y2="290" stroke="#b1bac4" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="680" y1="290" x2="350" y2="290" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="350" y1="270" x2="350" y2="290" stroke="#f97316" stroke-width="1.5"/>

  <!-- Nexus submitReview -->
  <rect x="315" y="253" width="70" height="34" rx="6" fill="#1c2128" stroke="#f97316" stroke-opacity="0.5" stroke-width="1"/>
  <text x="350" y="274" text-anchor="middle" fill="#f97316" font-size="8" font-weight="600">review</text>

  <!-- Arrow from Nexus review to await (Update) -->
  <line x1="385" y1="270" x2="450" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
  <text x="420" y="248" fill="#22c55e" font-size="8" font-weight="600">Update</text>

  <!-- Arrow from payments to Nexus review -->
  <line x1="160" y1="190" x2="160" y2="270" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="60" y="253" width="200" height="34" rx="6" fill="#1c2128" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="160" y="274" text-anchor="middle" fill="#ffffff" font-size="10">ReviewCallerWorkflow</text>
  <line x1="260" y1="270" x2="315" y2="270" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowBlue)"/>

  <!-- Arrow down from await to result -->
  <line x1="530" y1="248" x2="530" y2="310" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Result box -->
  <rect x="450" y="310" width="160" height="40" rx="6" fill="#1c2128" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="530" y="330" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">RESULT</text>
  <text x="530" y="343" text-anchor="middle" fill="#ffffff" font-size="9">returns via Nexus</text>

  <!-- Arrow from result back to payments -->
  <line x1="450" y1="330" x2="350" y2="330" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="350" y1="330" x2="260" y2="330" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Payment completes -->
  <rect x="60" y="313" width="200" height="34" rx="6" fill="#1c2128" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="160" y="334" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">TXN-B → COMPLETED</text>

</svg>